<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Toolkit | Premium Developer Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <h1 class="glow-text">JS Toolkit</h1>
            <p class="subtitle">Minimalist tools for maximalist developers</p>
        </header>

        <section class="tools-grid">
            <!-- Tool 1: Text Utility -->
            <div class="card glass" id="tool-text">
                <div class="card-header">
                    <span class="icon">📝</span>
                    <h2>Text Utility</h2>
                </div>
                <div class="card-body">
                    <textarea id="text-input" placeholder="Type or paste your text here..."></textarea>
                    <div class="stats">
                        <span id="char-count">0 characters</span>
                        <span id="word-count">0 words</span>
                    </div>
                </div>
            </div>

            <!-- Tool 2: Password Generator -->
            <div class="card glass" id="tool-pass">
                <div class="card-header">
                    <span class="icon">🔐</span>
                    <h2>PassGen</h2>
                </div>
                <div class="card-body">
                    <div class="output-row">
                        <input type="text" id="pass-output" readonly placeholder="Generated sequence">
                        <button id="copy-pass" class="btn-icon">📋</button>
                    </div>
                    <div class="controls">
                        <input type="range" id="pass-length" min="8" max="32" value="16">
                        <span id="length-val">16</span>
                    </div>
                    <button id="gen-btn" class="btn-primary">Generate Shield</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
